                                                    <div className="text-xs text-slate-600 italic">Keine Trigger aktiv.</div>
                                                ) : (
                                                    playerState.marketAlerts.map(alert => (
                                                        <div key={alert.id} className="flex justify-between items-center p-2 bg-black border border-slate-800 rounded mb-2">
                                                            <div className="text-xs text-slate-300">
                                                                <span className="font-bold text-white">{alert.coin}</span> {alert.condition === 'above' ? '>' : '<'} <span className="text-cyan-400">{alert.targetPrice.toFixed(2)}</span>
                                                            </div>
                                                            <button 
                                                                onClick={() => removeAlert(alert.id)}
                                                                className="text-slate-500 hover:text-red-500 p-1 cursor-pointer"
                                                            >
                                                                <XIcon className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-black border border-slate-800 rounded flex flex-col h-40 shrink-0">
                                <div className="p-2 border-b border-slate-800 text-xs font-bold text-slate-500 flex items-center gap-2 bg-slate-900/50 shrink-0">
                                    <NewspaperIcon className="w-4 h-4"/> MARKET_FEED
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-3 custom-scrollbar">

                { id: 2, sender: "Unknown_Proxy", subject: "RE: Gigs", body: "Hab gehört, du bist wieder online, Nathan. \n\nDein Apartment wurde komplett entkernt, was? Pech für dich. Wenn du ein paar schnelle Credits brauchst, um nicht zu verhungern, nutz die NetRunner App auf deinem Desktop. \n\nIst simpel: Du entschlüsselst Datenpakete (Kryptos) und vertickst sie auf dem Market Exchange. Wenn du Hardware-Upgrades brauchst, um den Prozess zu beschleunigen, lad den Nexus Browser runter und geh auf den BlackMarket.\n\nLass dich nicht von den Syndikaten erwischen.\n\n- V.", date: "02:45 AM", read: false }

            furniture: [],

        // --- GLOBALE AUDIO API FÜR FEEDBACK ---
        let audioCtx = null;
        const playClickSound = () => {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine'; // Weicher futuristischer Ton
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
                
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } catch (e) {
                console.warn("AudioFeedback failed", e);
            }
        };

        const MainGame = ({ setGameState }) => {
            const [openApps, setOpenApps] = useState([]);

            const [playerState, setPlayerState] = useState(() => {

                return DEFAULT_PLAYER_STATE;

            useEffect(() => { localStorage.setItem('cyberOS_save', JSON.stringify(playerState)); }, [playerState]);

            const addNotification = (title, message, type = 'info') => {
                const id = Date.now() + Math.random();
                setNotifications(prev => [...prev, { id, title, message, type }]);
                setTimeout(() => { setNotifications(prev => prev.filter(n => n.id !== id)); }, 5000);
            };

            useEffect(() => {
                const marketTick = setInterval(() => {
                    setPlayerState(prev => {
                        const currentMarket = prev.market || DEFAULT_PLAYER_STATE.market;
                        const newMarket = {};
                        let newNews = prev.marketNews ? [...prev.marketNews] : [];
                        let newsGenerated = false;

                        Object.keys(CRYPTO_TYPES).forEach(coin => {
                            const basePrice = CRYPTO_TYPES[coin].value;
                            const currentData = currentMarket[coin] || { price: basePrice, history: Array(40).fill(basePrice), trend: 0 };
                            let changePct = (Math.random() - 0.5) * 0.06;
                            
                            if (Math.random() < 0.04 && !newsGenerated) {
                                newsGenerated = true;
                                const isGood = Math.random() > 0.5;
                                changePct = (Math.random() * 0.3 + 0.1) * (isGood ? 1 : -1); 
                                const newsTemplatesGood = [ `Megacorp adaptiert ${coin} für interne Transaktionen.`, `Unbekannter Wal kauft Millionen von ${coin}.`, `Neue Verschlüsselung treibt das Vertrauen in ${coin}.`, `${coin} offiziell als Zahlungsmittel akzeptiert.` ];

                                const msg = isGood ? newsTemplatesGood[Math.floor(Math.random() * newsTemplatesGood.length)] : newsTemplatesBad[Math.floor(Math.random() * newsTemplatesBad.length)];
                                newNews.unshift({ time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}), msg, type: isGood ? 'good' : 'bad', coin });
                            }
                            if (currentData.price > basePrice * 5) changePct -= 0.05;
                            if (currentData.price < basePrice * 0.2) changePct += 0.05;

                            let newPrice = Math.max(0.01, currentData.price * (1 + changePct));
                            newMarket[coin] = { price: newPrice, history: [...currentData.history, newPrice].slice(-40), trend: newPrice - currentData.price };

                        // NEU: Market Alerts überprüfen

                const gigTick = setInterval(() => {
                    setPlayerState(prev => {
                        const currentGigs = prev.gigs || { available: [], active: null, completed: 0 };
                        let newAvailable = [...currentGigs.available];

                        if (newAvailable.length < 4 && Math.random() < 0.2) newAvailable.push(generateRandomGig());
                        if (newAvailable.length > 0 && Math.random() < 0.05) newAvailable.shift();

                        if (!currentGigs.active) return { ...prev, gigs: { ...currentGigs, available: newAvailable } };

                        const newProgress = active.progress + 1;
                        
                        if (newProgress >= active.duration) {

                                let newCredits = prev.credits;
                                let newInv = { ...prev.inventory };

                                else newInv[gigDef.rewardType] += gigDef.rewardAmount;

                                return { ...prev, credits: newCredits, inventory: newInv, gigs: { ...currentGigs, active: null, completed: currentGigs.completed + 1, available: newAvailable.filter(g => g.id !== gigDef.id) } };
                            }
                        }
                        return { ...prev, gigs: { ...currentGigs, available: newAvailable, active: { ...active, progress: newProgress } } };
                    });
                }, 1000);

                return () => { clearInterval(marketTick); clearInterval(gigTick); };

                return () => { 
                    window.removeEventListener('gig-complete', handleGigComplete);

            const handleOpenApp = (appId) => {

            };

            const memoryUsage = Math.min(99.9, 12.4 + (openApps.length * 15.2)).toFixed(1);

                                    <AppContent playerState={playerState} setPlayerState={setPlayerState} addNotification={addNotification} />
                                </WindowComponent>
                            );
                        })}
                    </main>

                    <div className="fixed top-16 right-4 z-[200] flex flex-col gap-3 pointer-events-none w-72">
                        {notifications.map(note => (
                            <div key={note.id} className="bg-slate-900/95 border border-slate-700 shadow-[0_0_15px_rgba(0,0,0,0.8)] backdrop-blur-md rounded p-3 animate-slide-in-right flex gap-3 items-start pointer-events-auto">
                                <div className="mt-0.5">
                                    {note.type === 'error' && <AlertTriangleIcon className="w-5 h-5 text-red-500" />}
                                    {note.type === 'success' && <CheckCircleIcon className="w-5 h-5 text-green-500" />}
                                    {note.type === 'info' && <BellIcon className="w-5 h-5 text-cyan-400" />}
                                </div>
                                <div className="flex-1"><h4 className={`text-xs font-bold font-mono tracking-wider ${note.type === 'error' ? 'text-red-500' : note.type === 'success' ? 'text-green-500' : 'text-cyan-400'}`}>{note.title}</h4><p className="text-[11px] text-slate-300 font-sans leading-tight mt-1">{note.message}</p></div>
                            </div>
                        ))}
                    </div>
                    
                    {isStartMenuOpen && (
                        <div className="absolute bottom-12 left-2 w-64 bg-slate-950/95 border border-cyan-500/50 shadow-[0_0_20px_rgba(34,211,238,0.2)] backdrop-blur-xl z-[100] rounded-t-sm flex flex-col font-mono text-sm overflow-hidden animate-fade-in" onClick={(e) => e.stopPropagation()}>
                            <div className="p-4 border-b border-slate-800 flex items-center gap-3 bg-black hover:bg-slate-900 transition-colors cursor-pointer group" onClick={() => handleOpenApp('portfolio')}>
                                <div className="w-10 h-10 rounded-full bg-slate-900 border border-purple-500 flex items-center justify-center group-hover:shadow-[0_0_10px_rgba(168,85,247,0.5)] transition-shadow"><span className="text-purple-500 font-bold">N</span></div>
                                <div><div className="text-white font-bold">{playerState.profile.name}</div><div className="text-[10px] text-slate-400 group-hover:text-purple-400 transition-colors">PORTFOLIO & PROFIL ansehen</div></div>
                            </div>
                            <div className="flex flex-col p-2 gap-1 border-b border-slate-800 py-3">
                                <div className="text-[10px] text-slate-500 px-2 mb-1 tracking-widest">SYSTEM APPS</div>
                                {Object.values(APPS).filter(app => app.showInStart).map(app => (
                                    <button key={app.id} onClick={() => handleOpenApp(app.id)} className="flex items-center gap-3 p-2 hover:bg-slate-800 rounded text-slate-300 hover:text-white transition-colors cursor-pointer text-left"><app.icon className={`w-4 h-4 ${app.color}`} /> {app.name}</button>
                                ))}
                            </div>
                            <div className="flex flex-col p-2 gap-1 bg-slate-950/80">
                                <button onClick={() => setGameState(GAME_STATES.BOOTING)} className="flex items-center gap-3 p-2 hover:bg-slate-800 rounded text-slate-300 hover:text-cyan-400 transition-colors cursor-pointer text-left"><RefreshIcon className="w-4 h-4" /> Neustart</button>
                                <button onClick={() => setGameState(GAME_STATES.OFF)} className="flex items-center gap-3 p-2 hover:bg-slate-800 rounded text-slate-300 hover:text-red-500 transition-colors cursor-pointer text-left"><PowerIcon className="w-4 h-4" /> Herunterfahren</button>
                            </div>
                        </div>
                    )}

                    <footer className="h-10 w-full bg-black/95 border-t border-cyan-900 z-50 relative flex items-center px-2 gap-2 backdrop-blur-lg">
                        <button onClick={(e) => { e.stopPropagation(); setIsStartMenuOpen(!isStartMenuOpen); }} className={`p-1.5 rounded cursor-pointer transition-colors ${isStartMenuOpen ? 'bg-cyan-900/50 text-cyan-400' : 'text-slate-400 hover:text-cyan-400 hover:bg-slate-800'}`}><HexagonIcon className="w-6 h-6" /></button>
                        <div className="w-px h-6 bg-slate-800 mx-1"></div>
                        <div className="flex-1 flex gap-1 overflow-x-auto custom-scrollbar">
                            {openApps.map(appId => {
                                const app = APPS[appId]; const isActive = activeApp === appId;
                                return (
                                    <button key={appId} onClick={(e) => { e.stopPropagation(); setActiveApp(appId); }} className={`flex items-center gap-2 px-3 h-8 min-w-[120px] max-w-[160px] rounded-sm border-b-2 transition-all cursor-pointer font-mono text-xs truncate ${isActive ? 'bg-slate-800 border-cyan-400 text-white' : 'bg-slate-900/50 border-transparent text-slate-400 hover:bg-slate-800'}`}>
                                        <app.icon className={`w-4 h-4 flex-shrink-0 ${app.color}`} /><span className="truncate">{app.name}</span>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="flex flex-col items-end px-2 border-l border-slate-800"><div className="text-[10px] font-mono text-cyan-500/70">SYSTIME_OK</div><div className="text-[8px] font-mono text-slate-500">AUTOSAVE: ON</div></div>
                    </footer>
                </div>
            );
        };

        function App() {
            const [gameState, setGameState] = useState(GAME_STATES.OFF);

            useEffect(() => {
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
                    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
                    @keyframes slideInRight { 0% { transform: translateX(120%); opacity: 0; } 10% { transform: translateX(-5%); opacity: 1; } 15% { transform: translateX(0); opacity: 1; } 90% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(120%); opacity: 0; } }
                    .animate-slide-in-right { animation: slideInRight 5s ease-in-out forwards; }
                    @keyframes fogDrift1 { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-45%, -55%) scale(1.1); opacity: 0.8; } }
                    .animate-fog-drift-1 { animation: fogDrift1 10s ease-in-out infinite; }
                    @keyframes fogDrift2 { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-55%, -45%) scale(1.1); opacity: 0.8; } }
                    .animate-fog-drift-2 { animation: fogDrift2 12s ease-in-out infinite; }
                    @keyframes lightBeam1 { 0% { transform: translateX(-100vw) translateY(0) rotate(15deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(100vw) translateY(100px) rotate(15deg); opacity: 0; } }
                    .animate-light-beam-1 { animation: lightBeam1 6s linear infinite; }
                    @keyframes lightBeam2 { 0% { transform: translateX(100vw) translateY(0) rotate(-15deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(-100vw) translateY(-100px) rotate(-15deg); opacity: 0; } }
                    .animate-light-beam-2 { animation: lightBeam2 8s linear infinite; animation-delay: 2s; }
                    @keyframes particleFloat { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 1; transform: translateY(-20px) scale(1); } 80% { opacity: 1; } 100% { transform: translateY(-100px) scale(0); opacity: 0; } }
                    .animate-particle-float { animation: particleFloat linear infinite forwards; }
                    @keyframes fogEngulfPink { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; filter: blur(100px); } 100% { transform: translate(-50%, -50%) scale(5); opacity: 1; filter: blur(30px); } }
                    .animate-fog-engulf-pink { animation: fogEngulfPink 3.5s ease-in forwards; }
                    @keyframes fogEngulfBlue { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; filter: blur(100px); } 100% { transform: translate(-50%, -50%) scale(5); opacity: 1; filter: blur(30px); } }
                    .animate-fog-engulf-blue { animation: fogEngulfBlue 3.5s ease-in forwards; }
                    @keyframes fogEngulfCenter { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; filter: blur(50px); } 50% { opacity: 1; filter: blur(80px); } 100% { transform: translate(-50%, -50%) scale(15); opacity: 1; filter: blur(10px); } }
                    .animate-fog-engulf-center { animation: fogEngulfCenter 3.5s ease-in forwards; }
                    @keyframes systemFlash { 0%, 75% { opacity: 0; } 95% { opacity: 1; } 100% { opacity: 0; } }
                    .animate-system-flash { animation: systemFlash 3.5s ease-in-out forwards; }
                    
                    /* NEU: CRT Scanlines Filter */
                    .crt-scanlines {
                        position: absolute;
                        top: 0; left: 0; right: 0; bottom: 0;
                        z-index: 9999;
                        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
                        background-size: 100% 2px, 3px 100%;
                        pointer-events: none;
                    }

                    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                    .custom-scrollbar::-webkit-scrollbar-track { background: #020617; }
                    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
                    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
                `;
                document.head.appendChild(style);
                return () => document.head.removeChild(style);
            }, []);

            return (
                <div className="w-full h-screen bg-black overflow-hidden select-none">
                    {gameState === GAME_STATES.OFF && <PowerScreen onPowerOn={() => setGameState(GAME_STATES.WAKING)} />}
                    {gameState === GAME_STATES.WAKING && <StartupAnimationScreen onComplete={() => setGameState(GAME_STATES.BOOTING)} />}
                    {gameState === GAME_STATES.BOOTING && <BootScreen onComplete={() => setGameState(GAME_STATES.RUNNING)} />}
                    {gameState === GAME_STATES.RUNNING && <MainGame setGameState={setGameState} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
