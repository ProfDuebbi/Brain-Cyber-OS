<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Clicker</title>
    
    <!-- Tailwind CSS laden -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM laden -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel laden (Übersetzt den JSX Code für den Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: black; overflow: hidden; }
    </style>
</head>
<body>
    <!-- Hier wird die React App gerendert -->
    <div id="root"></div>

    <!-- Unser eigentlicher App-Code -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ERSATZ FÜR DIE LUCIDE-ICONS (Inline SVGs) ---

        const FileTextIcon = ({ className }) => (

                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>

        const RefreshIcon = ({ className }) => (

                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        );

        const CpuIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="9" y1="1" x2="9" y2="4"></line>
                <line x1="15" y1="1" x2="15" y2="4"></line>
                <line x1="9" y1="20" x2="9" y2="23"></line>
                <line x1="15" y1="20" x2="15" y2="23"></line>
                <line x1="20" y1="9" x2="23" y2="9"></line>
                <line x1="20" y1="14" x2="23" y2="14"></line>
                <line x1="1" y1="9" x2="4" y2="9"></line>
                <line x1="1" y1="14" x2="4" y2="14"></line>
            </svg>
        );

        const WalletIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path>
                <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
                <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path>
            </svg>
        );

        const ActivityIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        );

        const DatabaseIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
        );

        const UserIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const GlobeIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
        );

        const AlertTriangleIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        );

        const BellIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
        );

        const CheckCircleIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const TrendingUpIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                <polyline points="16 7 22 7 22 13"></polyline>
            </svg>
        );

        const TrendingDownIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline>
                <polyline points="16 17 22 17 22 11"></polyline>
            </svg>
        );

        const NewspaperIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>
                <path d="M18 14h-8"></path>
                <path d="M15 18h-5"></path>
                <path d="M10 6h8v4h-8V6Z"></path>
            </svg>
        );

        const MailIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
        );

        const ShoppingCartIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        );

        const BriefcaseIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
        );

        const CameraIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
                <circle cx="12" cy="13" r="3"></circle>
            </svg>
        );

        const ShieldIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        );

        const BarChartIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="20" x2="12" y2="10"></line>
                <line x1="18" y1="20" x2="18" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
        );

        // ==========================================
        // 1. KONFIGURATION & DATENBANKEN
        // ==========================================
        const GAME_STATES = { OFF: 'OFF', WAKING: 'WAKING', BOOTING: 'BOOTING', RUNNING: 'RUNNING' };

        const THEME = {
            bg: 'bg-slate-950',
            neonPink: 'text-pink-500 drop-shadow-[0_0_10px_rgba(236,72,153,0.8)]',
            neonPurple: 'text-purple-500 drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]',
            neonBlue: 'text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]',
            neonRed: 'text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]',
        };

        const BOOT_SEQUENCE_LOGS = [
            "INITIALISIERE NEURALE VERBINDUNG...",
            "LADE KERNEL-MODULE [CYBER_CORE_V9.4]...",
            "MOUNTING VIRTUAL FILE SYSTEM... OK",
            "ÜBERPRÜFE ENERGIE-KNOTEN... 100%",
            "DEKODIERE SICHERHEITSPROTOKOLLE...",
            "WARNUNG: UNBEKANNTE SIGNATUR ENTDECKT.",
            "IGNORIERE WARNUNG. ERZWINGE SYSTEMSTART...",
            "VERBINDUNG ZUM NETZWERK HERGESTELLT.",
            "SYSTEM BEREIT."
        ];

        const CRYPTO_TYPES = {
            NNC: { id: 'NNC', name: 'NeonCoin', color: 'text-pink-500', bg: 'bg-pink-500', hex: '#ec4899', value: 0.5, successRate: 0.8, mineAmount: 0.1 },
            BYC: { id: 'BYC', name: 'ByteCredit', color: 'text-blue-400', bg: 'bg-blue-400', hex: '#60a5fa', value: 2.5, successRate: 0.4, mineAmount: 0.05 },
            VDT: { id: 'VDT', name: 'VoidToken', color: 'text-purple-500', bg: 'bg-purple-500', hex: '#a855f7', value: 15.0, successRate: 0.15, mineAmount: 0.01 }
        };

        const FURNITURE_ITEMS = [
            { id: 'f_matratze', name: 'Memory-Foam Matratze', desc: 'Besser als der Polymer-Boden. +10% Erholungsfaktor.', cost: 150, recovery: 10 },
            { id: 'f_desk', name: 'Gebrauchter Cyber-Desk', desc: 'Nie wieder Rückenschmerzen beim Coden. +15% Erholungsfaktor.', cost: 300, recovery: 15 },
            { id: 'f_chair', name: 'Ergonomischer NetRunner-Stuhl', desc: 'Wie auf Wolken sitzen. +25% Erholungsfaktor.', cost: 600, recovery: 25 },
            { id: 'f_bed', name: 'Schlafkapsel Deluxe', desc: 'Tiefschlaf-Garantie inklusive White-Noise. +50% Erholungsfaktor.', cost: 1500, recovery: 50 }
        ];

        const CHANGELOG_DATA = [
            { 
                version: "v0.2.0Alpha", 
                date: "AKTUELL", 
                changes: [
                    "Zusammenführung aller bisherigen Features zur ersten spielbaren Alpha",
                    "Dynamisches Krypto-Market-System mit Trading-UI und Preis-Alarmen",
                    "ShadowBoard App (Gigs & Missionen) inkl. Risiko- und Polizei-Strafsystem",
                    "Nexus Browser, BlackMarket Hardware-Shop & NeoHome Möbel-Portal",
                    "SmartCam App (Echtzeit-Wohnungsvisualisierung) integriert",
                    "SecureMail Client mit interaktiven Story-Mails (E.V.A.)",
                    "Passives GPU-Mining mit Thermal-Management (Hitze & Kühlung)",
                    "Systemweite OS-Benachrichtigungen (Push Alerts) hinzugefügt"
                ] 
            },
            { 
                version: "v0.1.0Alpha", 
                date: "ARCHIV", 
                changes: [
                    "Start der Story-Elemente hinzugefügt",
                    "Logische Grundgerüste im OS erstellt, um das System nutzbar zu machen",
                    "Frei bewegliche & skalierbare Fenster (Desktop-Manager) etabliert",
                    "Persistente Datenspeicherung (Auto-Save) implementiert"
                ] 
            },
            { 
                version: "v0.0.1Alpha", 
                date: "ARCHIV", 
                changes: [
                    "Grundgerüst des Terminal OS erstellt",
                    "Grundidee des Cyberpunk Clicker-Konzepts definiert"
                ] 
            }
        ];

        const Sparkline = ({ data, color }) => {
            if (!data || data.length === 0) return null;
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min === 0 ? 1 : max - min;
            const points = data.map((val, i) => `${(i / (data.length - 1)) * 100},${100 - ((val - min) / range) * 100}`).join(' ');
            
            return (
                <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible drop-shadow-md" preserveAspectRatio="none">
                    <polyline points={points} fill="none" stroke={color} strokeWidth="3" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        };

        // ==========================================
        // 2. KOMPONENTEN
        // ==========================================

        const PowerScreen = ({ onPowerOn }) => {
            const particles = useMemo(() => Array.from({ length: 50 }).map((_, i) => ({
                id: i,
                left: `${Math.random() * 100}%`,
                top: `${Math.random() * 100}%`,
                animationDelay: `${Math.random() * 5}s`,
                animationDuration: `${3 + Math.random() * 5}s`
            })), []);

            return (
                <div className="flex flex-col items-center justify-center h-full w-full bg-black relative overflow-hidden">
                    <div className="absolute top-1/2 left-[30%] w-[60vw] h-[60vw] bg-pink-600/30 rounded-full mix-blend-screen filter blur-[100px] animate-fog-drift-1 pointer-events-none"></div>
                    <div className="absolute top-1/2 left-[70%] w-[60vw] h-[60vw] bg-blue-600/30 rounded-full mix-blend-screen filter blur-[100px] animate-fog-drift-2 pointer-events-none"></div>
                    <div className="absolute top-1/4 left-0 w-96 h-1 bg-pink-500/50 blur-md animate-light-beam-1 pointer-events-none"></div>
                    <div className="absolute bottom-1/4 right-0 w-[30rem] h-1 bg-blue-500/50 blur-md animate-light-beam-2 pointer-events-none"></div>

                    <div className="absolute inset-0 pointer-events-none z-10">
                        {particles.map(p => (
                            <div key={p.id} className="absolute w-1 h-1 bg-white rounded-full opacity-0 animate-particle-float shadow-[0_0_8px_white]" style={{ left: p.left, top: p.top, animationDelay: p.animationDelay, animationDuration: p.animationDuration }} />
                        ))}
                    </div>

                    <div className="relative flex items-center justify-center w-64 h-96 p-[3px] rounded-sm bg-gradient-to-b from-pink-500 to-blue-600 shadow-[0_-20px_50px_rgba(236,72,153,0.2),_0_20px_50px_rgba(37,99,235,0.2)] z-20">
                        <div className="absolute inset-0 bg-black m-[2px]"></div>
                        <div className="absolute -bottom-12 w-48 h-2 bg-gradient-to-r from-pink-600 to-blue-600 blur-md rounded-full opacity-80"></div>
                        <button onClick={onPowerOn} className={`relative group flex flex-col items-center justify-center p-8 rounded-full border border-transparent hover:border-pink-500/50 transition-all duration-500 ease-in-out bg-transparent z-30 cursor-pointer`}>
                            <PowerIcon className={`w-16 h-16 text-slate-700 group-hover:text-pink-500 group-hover:drop-shadow-[0_0_20px_rgba(236,72,153,1)] transition-all duration-300`} />
                            <span className="mt-4 font-mono text-sm text-slate-600 group-hover:text-white tracking-widest transition-colors duration-300 group-hover:drop-shadow-[0_0_8px_white]">SYSTEM_START</span>
                        </button>
                    </div>
                </div>
            );
        };

        const StartupAnimationScreen = ({ onComplete }) => {
            useEffect(() => {
                const timer = setTimeout(() => { onComplete(); }, 3500);
                return () => clearTimeout(timer);
            }, [onComplete]);

            return (
                <div className="flex items-center justify-center h-full w-full bg-black relative overflow-hidden">
                    <div className="absolute top-1/2 left-[30%] w-[60vw] h-[60vw] bg-pink-600 rounded-full mix-blend-screen animate-fog-engulf-pink pointer-events-none"></div>
                    <div className="absolute top-1/2 left-[70%] w-[60vw] h-[60vw] bg-blue-600 rounded-full mix-blend-screen animate-fog-engulf-blue pointer-events-none"></div>
                    <div className="absolute top-1/2 left-1/2 w-32 h-32 bg-purple-500 rounded-full mix-blend-screen animate-fog-engulf-center pointer-events-none"></div>
                    <div className="absolute inset-0 bg-white animate-system-flash pointer-events-none z-50"></div>
                </div>
            );
        };

        const BootScreen = ({ onComplete }) => {
            const [logs, setLogs] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const bottomRef = useRef(null);

            useEffect(() => {
                if (currentIndex < BOOT_SEQUENCE_LOGS.length) {
                    const timer = setTimeout(() => {
                        setLogs(prev => [...prev, BOOT_SEQUENCE_LOGS[currentIndex]]);
                        setCurrentIndex(prev => prev + 1);
                    }, Math.random() * 400 + 200);
                    return () => clearTimeout(timer);
                } else {
                    const endTimer = setTimeout(() => { onComplete(); }, 1500);
                    return () => clearTimeout(endTimer);
                }
            }, [currentIndex, onComplete]);

            useEffect(() => {
                if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [logs]);

            return (
                <div className="flex flex-col h-full w-full bg-black text-cyan-400 font-mono p-6 overflow-hidden relative">
                    <div className="absolute top-0 left-0 w-full h-full bg-cyan-900/10 pointer-events-none" style={{ backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(34, 211, 238, 0.05) 2px, rgba(34, 211, 238, 0.05) 4px)' }}></div>
                    <div className="flex items-center mb-6 border-b border-cyan-800 pb-2">
                        <TerminalIcon className="w-5 h-5 mr-2" />
                        <span className="tracking-widest opacity-70">OS_TERMINAL_V1.0</span>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-2 text-sm md:text-base z-10">
                        {logs.map((log, index) => (
                            <div key={index} className="animate-fade-in flex">
                                <span className="text-slate-500 mr-4">[{String(index).padStart(2, '0')}]</span>
                                <span className={log.includes("WARNUNG") ? THEME.neonRed : log.includes("OK") || log.includes("BEREIT") ? THEME.neonPink : THEME.neonBlue}>{log}</span>
                            </div>
                        ))}
                        {currentIndex < BOOT_SEQUENCE_LOGS.length && (
                            <div className="flex animate-pulse">
                                <span className="text-slate-500 mr-4">[{String(currentIndex).padStart(2, '0')}]</span>
                                <span className="w-3 h-5 bg-cyan-400 inline-block"></span>
                            </div>
                        )}
                        <div ref={bottomRef} />
                    </div>
                </div>
            );
        };

        const WindowComponent = ({ title, onClose, isActive, onClick, children, themeColor, initialPos = { x: 50, y: 50 }, initialSize = { width: 600, height: 400 } }) => {
            const [pos, setPos] = useState(initialPos);
            const [size, setSize] = useState(initialSize);
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const [rel, setRel] = useState(null); 
            const [resizeRel, setResizeRel] = useState(null); 

            useEffect(() => {
                if (window.innerWidth < size.width) setSize(s => ({ ...s, width: window.innerWidth * 0.9 }));
            }, []);

            const handlePointerDown = (e) => {
                if (e.target.closest('.close-btn')) return;
                onClick(e); 
                e.target.setPointerCapture(e.pointerId); 
                setIsDragging(true);
                setRel({ x: e.clientX - pos.x, y: e.clientY - pos.y });
                e.stopPropagation();
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                let newX = Math.max(0, Math.min(e.clientX - rel.x, Math.max(0, window.innerWidth - size.width)));
                let newY = Math.max(0, Math.min(e.clientY - rel.y, Math.max(0, window.innerHeight - 85 - size.height)));
                setPos({ x: newX, y: newY });
                e.stopPropagation();
            };

            const handlePointerUp = (e) => {
                if (!isDragging) return;
                setIsDragging(false);
                e.target.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };

            const handleResizePointerDown = (e) => {
                onClick(e);
                e.target.setPointerCapture(e.pointerId);
                setIsResizing(true);
                setResizeRel({ x: e.clientX - size.width, y: e.clientY - size.height });
                e.stopPropagation();
            };

            const handleResizePointerMove = (e) => {
                if (!isResizing) return;
                const newWidth = Math.min(window.innerWidth - pos.x, Math.max(300, e.clientX - resizeRel.x));
                const newHeight = Math.min(window.innerHeight - 85 - pos.y, Math.max(200, e.clientY - resizeRel.y));
                setSize({ width: newWidth, height: newHeight });
                e.stopPropagation();
            };

            const handleResizePointerUp = (e) => {
                if (!isResizing) return;
                setIsResizing(false);
                e.target.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };

            return (
                <div onPointerDown={onClick} style={{ left: `${pos.x}px`, top: `${pos.y}px`, width: `${size.width}px`, height: `${size.height}px`, position: 'absolute' }} className={`bg-slate-900/95 border ${themeColor} shadow-2xl flex flex-col rounded-sm overflow-hidden backdrop-blur-md transition-shadow ${isActive ? 'z-50 shadow-[0_0_20px_rgba(0,0,0,0.8)]' : 'z-40 opacity-95 grayscale-[30%]'}`}>
                    <div onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} className={`flex justify-between items-center p-2 border-b ${themeColor} ${isActive ? 'bg-slate-950' : 'bg-slate-900'} cursor-move touch-none`}>
                        <span className={`font-mono text-sm tracking-wider select-none ${themeColor.replace('border-', 'text-')}`}>{title}</span>
                        <button onClick={(e) => { e.stopPropagation(); onClose(); }} className="close-btn text-slate-500 hover:text-red-500 transition-colors cursor-pointer p-1">
                            <XIcon className="w-5 h-5 pointer-events-none" />
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar cursor-default relative">
                        {children}
                    </div>
                    <div onPointerDown={handleResizePointerDown} onPointerMove={handleResizePointerMove} onPointerUp={handleResizePointerUp} onPointerCancel={handleResizePointerUp} className="absolute bottom-0 right-0 w-6 h-6 cursor-se-resize flex items-end justify-end p-1.5 z-50 touch-none">
                        <div className={`w-2.5 h-2.5 border-r-2 border-b-2 ${themeColor.replace('border-', 'border-')} opacity-50`}></div>
                    </div>
                </div>
            );
        };

        const StoryApp = () => (
            <div className="font-mono text-slate-300 space-y-8 text-sm md:text-base">
                <div className="border-l-2 border-pink-500 pl-4">
                    <h3 className="text-pink-500 font-bold mb-2">LOG 01: Das Echo der Leere</h3>
                    <p className="mb-2">Nathan wacht auf. Nicht auf seiner durchgelegenen Memory-Foam-Matratze, sondern auf eiskaltem, synthetischem Polymer-Boden. Der Kopf pocht nach einer Nacht voller billigem Synth-Bier und gescheiterten Versuchen, in einer lokalen Neon-Bar jemanden kennenzulernen. Er blinzelt gegen das flackernde Licht der Straßenlaterne, das durch das Fenster fällt.</p>
                    <p className="text-red-400">Dann der Schock: Der Raum hallt. Das Bett? Weg. Der alte Holo-TV? Weg. Sogar die halb leeren Ramen-Nudeln aus der Ecke und der flauschige Teppich sind verschwunden. Die Wohnung wurde nicht einfach ausgeraubt, sie wurde chirurgisch entkernt.</p>
                </div>
                <div className="border-l-2 border-cyan-400 pl-4">
                    <h3 className="text-cyan-400 font-bold mb-2">LOG 02: E.V.A. Status</h3>
                    <p className="mb-2">In dieser absoluten Null-Situation bleiben Nathan genau zwei Dinge: Seine Wohnungs-KI <span className="text-cyan-300">"E.V.A."</span> und sein Smartphone.</p>
                    <p className="mb-2 text-slate-500 italic">Die Elektronische Verwaltungs-Assistenz ist fest in die Wände des Gebäudes integriert und konnte daher nicht geklaut werden.</p>
                    <p>Das Problem: Da Nathan mit der Miete im Rückstand ist, läuft E.V.A. nur noch im "Energiespar- & Basis-Modus". Das Premium-Empathie-Paket ist deaktiviert. Sie antwortet absolut monoton, extrem trocken und schonungslos ehrlich über Nathans aktuelle Lage.</p>
                </div>
                <div className="border-l-2 border-purple-500 pl-4">
                    <h3 className="text-purple-500 font-bold mb-2">LOG 03: Terminal OS</h3>
                    <p>Nathans Retter in der Not. Es lag beim Schlafen in seiner Hosentasche. Terminal OS ist ein leicht illegales, modifiziertes Betriebssystem für Leute, die abseits der großen Firmen-Netzwerke operieren müssen.</p>
                    <p className="mt-2 text-slate-400">Hier laufen alle Fäden zusammen, um erste Credits zu verdienen und die Wohnung wieder einzurichten.</p>
                </div>
            </div>
        );

        const SettingsApp = ({ playerState, setPlayerState }) => {
            const [activeTab, setActiveTab] = useState('INFO');
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            // Hilfsfunktion zum Umschalten der Einstellungen
            const toggleSetting = (settingKey) => {
                setPlayerState(prev => {
                    const currentSettings = prev.settings || { crtScanlines: false, audioFeedback: false };
                    return {
                        ...prev,
                        settings: {
                            ...currentSettings,
                            [settingKey]: !currentSettings[settingKey]
                        }
                    };
                });
            };

            return (
                <div className="font-mono text-slate-300 flex flex-col h-full">
                    <div className="flex gap-4 border-b border-slate-800 mb-4 pb-2">
                        <button onClick={() => setActiveTab('INFO')} className={`transition-colors ${activeTab === 'INFO' ? 'text-cyan-400 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>SYSTEM_INFO</button>
                        <button onClick={() => setActiveTab('CONFIG')} className={`transition-colors ${activeTab === 'CONFIG' ? 'text-cyan-400 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>CONFIG</button>
                        <button onClick={() => setActiveTab('CHANGELOG')} className={`transition-colors ${activeTab === 'CHANGELOG' ? 'text-cyan-400 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>CHANGELOG</button>
                    </div>

                    {activeTab === 'INFO' && (
                        <div className="space-y-6 flex-1 overflow-y-auto">
                            <div className="bg-slate-950 p-4 border border-cyan-900/50 rounded flex items-center justify-between">
                                <div>
                                    <div className="text-xl text-white font-bold">Terminal OS</div>
                                    <div className="text-xs text-cyan-500">{CHANGELOG_DATA[0].version}-modded (Illegal Build)</div>
                                </div>
                                <TerminalIcon className="w-10 h-10 text-cyan-900" />
                            </div>
                            <div>
                                <h4 className="text-slate-500 text-xs mb-2 border-b border-slate-800 pb-1">HARDWARE SPECS</h4>
                                <div className="space-y-2">
                                    <div className="flex justify-between bg-slate-900/50 p-2 rounded border border-slate-800/50"><span className="text-slate-500">Prozessor (CPU)</span><span className="text-cyan-100 text-right">{playerState.hardware.cpu}</span></div>
                                    <div className="flex justify-between bg-slate-900/50 p-2 rounded border border-slate-800/50"><span className="text-slate-500">Arbeitsspeicher</span><span className="text-cyan-100 text-right">{playerState.hardware.ram}</span></div>
                                    <div className="flex justify-between bg-slate-900/50 p-2 rounded border border-slate-800/50"><span className="text-slate-500">Netzwerk-Uplink</span><span className="text-cyan-100 text-right">{playerState.hardware.network}</span></div>
                                    <div className="flex justify-between bg-slate-900/50 p-2 rounded border border-slate-800/50"><span className="text-slate-500">Grafik-Knoten (GPU)</span><span className="text-purple-400 text-right">{playerState.hardware.gpu}</span></div>
                                    <div className="flex justify-between bg-slate-900/50 p-2 rounded border border-slate-800/50"><span className="text-slate-500">Kühlung</span><span className="text-red-400 text-right">{playerState.hardware.cooling}</span></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'CONFIG' && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center bg-slate-950 p-3 rounded border border-slate-800">
                                <div><div className="text-white">CRT-Scanlines</div><div className="text-xs text-slate-500">Visueller Retro-Filter für das Terminal OS</div></div>
                                <button 
                                    onClick={() => toggleSetting('crtScanlines')} 
                                    className={`w-12 h-6 rounded-full relative cursor-pointer transition-colors ${playerState.settings?.crtScanlines ? 'bg-cyan-600' : 'bg-slate-700'}`}
                                >
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${playerState.settings?.crtScanlines ? 'right-1' : 'left-1'}`}></div>
                                </button>
                            </div>
                            <div className="flex justify-between items-center bg-slate-950 p-3 rounded border border-slate-800">
                                <div><div className="text-white">Audio-Feedback</div><div className="text-xs text-slate-500">Haptische und auditive UI-Reaktionen</div></div>
                                <button 
                                    onClick={() => toggleSetting('audioFeedback')} 
                                    className={`w-12 h-6 rounded-full relative cursor-pointer transition-colors ${playerState.settings?.audioFeedback ? 'bg-cyan-600' : 'bg-slate-700'}`}
                                >
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${playerState.settings?.audioFeedback ? 'right-1' : 'left-1'}`}></div>
                                </button>
                            </div>
                            {showResetConfirm ? (
                                <div className="flex justify-between items-center bg-red-900 p-3 rounded border border-red-500 mt-8 animate-fade-in">
                                    <div className="text-white text-xs font-bold tracking-widest">WIRKLICH LÖSCHEN?</div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowResetConfirm(false)} className="px-3 py-1 bg-slate-950 text-white hover:text-cyan-400 rounded text-xs transition-colors">ABBRUCH</button>
                                        <button onClick={() => { localStorage.removeItem('cyberOS_save'); window.location.reload(); }} className="px-3 py-1 bg-black text-red-500 border border-red-500 hover:bg-red-950 rounded text-xs font-bold transition-colors">JA, LÖSCHEN</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex justify-between items-center bg-red-950/20 p-3 rounded border border-red-900/50 mt-8">
                                    <div><div className="text-red-500 font-bold tracking-widest">SYSTEM_RESET</div><div className="text-xs text-red-400/70">Löscht alle lokalen Speicherdaten</div></div>
                                    <button onClick={() => setShowResetConfirm(true)} className="px-4 py-1.5 bg-red-900/30 hover:bg-red-900 border border-red-500 text-red-500 hover:text-white rounded text-xs font-bold transition-all cursor-pointer">FACTORY RESET</button>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'CHANGELOG' && (
                        <div className="space-y-6 flex-1 overflow-y-auto custom-scrollbar pr-2">
                            <div className="flex items-center gap-2 mb-4 text-cyan-400 border-b border-slate-800 pb-2">
                                <TerminalIcon className="w-5 h-5" />
                                <span className="font-bold tracking-widest">OS_VERSION_HISTORY</span>
                            </div>
                            <div className="space-y-6 relative before:absolute before:inset-0 before:ml-2 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-700 before:to-transparent">
                                {CHANGELOG_DATA.map((log, idx) => (
                                    <div key={idx} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                        <div className={`flex items-center justify-center w-5 h-5 rounded-full border-2 ${idx === 0 ? 'bg-cyan-900 border-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.5)]' : 'bg-slate-900 border-slate-600'} shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow absolute left-0 md:left-1/2 -translate-x-1/2`}></div>
                                        <div className="w-[calc(100%-2rem)] md:w-[calc(50%-1.5rem)] ml-auto md:ml-0 p-3 bg-slate-950 border border-slate-800 rounded hover:border-slate-600 transition-colors">
                                            <div className="flex items-center justify-between mb-2">
                                                <h4 className={`font-bold ${idx === 0 ? 'text-cyan-400' : 'text-slate-400'}`}>{log.version}</h4>
                                                <span className={`text-[10px] px-1.5 py-0.5 rounded ${idx === 0 ? 'bg-cyan-900/50 text-cyan-300' : 'bg-slate-800 text-slate-500'}`}>{log.date}</span>
                                            </div>
                                            <ul className="text-xs text-slate-400 space-y-1">
                                                {log.changes.map((change, i) => (
                                                    <li key={i} className="flex items-start gap-2"><span className="text-cyan-600 mt-0.5">›</span> <span>{change}</span></li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PortfolioApp = ({ playerState }) => {
            const totalPortfolioValue = Object.keys(playerState.inventory).reduce((total, key) => {
                const currentPrice = playerState.market?.[key]?.price || CRYPTO_TYPES[key].value;
                return total + (playerState.inventory[key] * currentPrice);
            }, 0);

            const recoveryFactor = (playerState.furniture || []).reduce((sum, itemId) => {
                const item = FURNITURE_ITEMS.find(f => f.id === itemId);
                return sum + (item ? item.recovery : 0);
            }, 0);

            return (
                <div className="font-mono text-slate-300 h-full flex flex-col gap-4 overflow-y-auto custom-scrollbar">
                    <div className="flex items-center gap-6 p-4 bg-slate-950 border border-purple-900/50 rounded flex-shrink-0">
                        <div className="relative">
                            <div className="w-20 h-20 rounded-sm bg-slate-900 border-2 border-purple-500 flex items-center justify-center overflow-hidden">
                                <UserIcon className="w-10 h-10 text-purple-500/50" />
                            </div>
                            <div className="absolute -bottom-2 -right-2 bg-black border border-purple-500 text-purple-400 text-[10px] px-2 py-0.5 rounded-sm shadow-md">LVL {playerState.profile.level}</div>
                        </div>
                        <div className="flex-1">
                            <h2 className="text-2xl font-bold text-white tracking-widest uppercase">{playerState.profile.name}</h2>
                            <p className="text-purple-400 text-sm mb-2">{playerState.profile.role}</p>
                            <div className={`inline-block px-2 py-1 text-xs rounded border ${playerState.tenant?.rentPaid ? 'bg-green-950/50 border-green-900/50 text-green-400' : 'bg-red-950/50 border-red-900/50 text-red-400'}`}>
                                STATUS: {playerState.tenant?.rentPaid ? 'AKTIVER MIETER' : 'KRITISCH (Mietrückstand)'}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3 flex-shrink-0">
                        <div className="bg-slate-900/80 p-3 rounded border border-slate-800 flex flex-col">
                            <span className="text-[10px] text-slate-500">LIQUIDE CREDITS</span>
                            <span className="text-lg text-cyan-400 font-bold">{playerState.credits.toFixed(2)} CR</span>
                        </div>
                        <div className="bg-slate-900/80 p-3 rounded border border-slate-800 flex flex-col">
                            <span className="text-[10px] text-slate-500">ASSET WERT (LIVE)</span>
                            <span className="text-lg text-pink-400 font-bold">{totalPortfolioValue.toFixed(2)} CR</span>
                        </div>
                        <div className="bg-slate-950 p-2 rounded border border-slate-800/50 flex justify-between items-center">
                            <span className="text-[10px] text-slate-500">ERHOLUNGSFAKTOR</span>
                            <span className={`text-xs font-bold ${recoveryFactor > 0 ? 'text-green-400' : 'text-slate-500'}`}>+{recoveryFactor}%</span>
                        </div>
                        <div className="bg-slate-950 p-2 rounded border border-slate-800/50 flex justify-between items-center">
                            <span className="text-[10px] text-slate-500">GIGS ERFÜLLT</span>
                            <span className="text-xs text-slate-300">{playerState.gigs?.completed || 0}</span>
                        </div>
                        <div className="bg-slate-950 p-2 rounded border border-slate-800/50 flex justify-between items-center col-span-2">
                            <span className="text-[10px] text-slate-500">WOHNUNGS-KI (E.V.A.)</span>
                            <span className={`text-xs font-bold ${playerState.tenant?.evaPremium ? 'text-pink-400 drop-shadow-[0_0_5px_rgba(236,72,153,0.8)]' : 'text-slate-500'}`}>
                                {playerState.tenant?.evaPremium ? 'Premium (Empathie-Paket aktiv)' : 'Basis (Energiesparmodus)'}
                            </span>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col mt-2">
                        <h4 className="text-slate-500 text-xs mb-2 border-b border-slate-800 pb-1">DIGITAL ASSETS</h4>
                        <div className="space-y-2">
                            {Object.values(CRYPTO_TYPES).map(c => {
                                const amount = playerState.inventory[c.id];
                                const currentPrice = playerState.market?.[c.id]?.price || c.value;
                                const value = amount * currentPrice;
                                const trend = playerState.market?.[c.id]?.trend || 0;
                                return (
                                    <div key={c.id} className="flex justify-between items-center p-3 bg-slate-950 border border-slate-800/50 rounded hover:border-slate-700 transition-colors">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-8 h-8 rounded bg-slate-900 border ${c.color.replace('text-', 'border-')} flex items-center justify-center`}>
                                                <DatabaseIcon className={`w-4 h-4 ${c.color}`} />
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-slate-200 text-sm">{c.name}</span>
                                                <span className={`${c.color} text-xs font-bold`}>{amount.toFixed(2)} <span className="opacity-70">{c.id}</span></span>
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-end">
                                            <span className="text-slate-400 text-sm">{value.toFixed(2)} CR</span>
                                            <span className="flex items-center gap-1 text-[10px] text-slate-500">
                                                @{currentPrice.toFixed(2)}/ea 
                                                {trend > 0 ? <TrendingUpIcon className="w-3 h-3 text-green-500" /> : <TrendingDownIcon className="w-3 h-3 text-red-500" />}
                                            </span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const MailApp = ({ playerState, setPlayerState }) => {
            const [selectedId, setSelectedId] = useState(null);
            const mails = playerState.mails || [];
            const sortedMails = [...mails].sort((a, b) => b.id - a.id);
            const selectedMail = mails.find(m => m.id === selectedId);

            const handleSelectMail = (id) => {
                setSelectedId(id);
                if (!mails.find(m => m.id === id).read) {
                    setPlayerState(prev => ({
                        ...prev,
                        mails: prev.mails.map(m => m.id === id ? { ...m, read: true } : m)
                    }));
                }
            };
            const unreadCount = mails.filter(m => !m.read).length;

            return (
                <div className="flex h-full font-mono text-sm bg-slate-950 rounded overflow-hidden">
                    <div className={`${selectedId ? 'hidden md:flex' : 'flex'} flex-col w-full md:w-[250px] border-r border-slate-800 bg-slate-900/50 flex-shrink-0`}>
                        <div className="p-3 border-b border-slate-800 bg-slate-950 text-yellow-400 font-bold flex justify-between items-center shrink-0">
                            <span>INBOX</span>
                            {unreadCount > 0 && <span className="text-[10px] bg-yellow-900 text-yellow-200 px-2 py-0.5 rounded">{unreadCount} UNREAD</span>}
                        </div>
                        <div className="overflow-y-auto flex-1 custom-scrollbar">
                            {sortedMails.map(mail => (
                                <div key={mail.id} onClick={() => handleSelectMail(mail.id)} className={`p-3 border-b border-slate-800/50 cursor-pointer transition-colors ${selectedId === mail.id ? 'bg-yellow-900/30 border-l-2 border-l-yellow-500' : 'hover:bg-slate-800'} ${!mail.read ? 'text-white' : 'text-slate-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className={`font-bold truncate ${!mail.read ? 'text-yellow-400' : 'text-slate-400'}`}>{mail.sender}</span>
                                        <span className="text-[9px] shrink-0 opacity-70 ml-2">{mail.date}</span>
                                    </div>
                                    <div className="truncate text-[11px] opacity-80">{mail.subject}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className={`${!selectedId ? 'hidden md:flex' : 'flex'} flex-col flex-1 bg-black relative`}>
                        {selectedMail ? (
                            <>
                                <div className="p-4 border-b border-slate-800 bg-slate-900/30 shrink-0">
                                    <div className="flex items-center justify-between mb-2">
                                        <button onClick={() => setSelectedId(null)} className="md:hidden text-yellow-500 hover:text-yellow-300 text-xs flex items-center gap-1 font-bold">← ZURÜCK</button>
                                        <span className="text-[10px] text-slate-500 ml-auto">{selectedMail.date}</span>
                                    </div>
                                    <h2 className="text-base md:text-lg font-bold text-white mb-2">{selectedMail.subject}</h2>
                                    <div className="text-xs text-slate-400 flex items-center gap-2">
                                        <UserIcon className="w-4 h-4 text-slate-500" />
                                        <span>VON: <span className="text-yellow-500 font-bold">{selectedMail.sender}</span></span>
                                    </div>
                                </div>
                                <div className="p-4 overflow-y-auto text-slate-300 whitespace-pre-wrap leading-relaxed custom-scrollbar text-sm md:text-base flex-1">{selectedMail.body}</div>
                            </>
                        ) : (
                            <div className="flex items-center justify-center h-full text-slate-600 italic text-xs">Wähle eine Nachricht aus.</div>
                        )}
                    </div>
                </div>
            );
        };

        const CryptoApp = ({ playerState, setPlayerState, addNotification }) => {
            const [selectedCrypto, setSelectedCrypto] = useState('NNC');
            const [logs, setLogs] = useState([]);
            const logsEndRef = useRef(null);
            const heat = playerState.gpuHeat || 0;

            const cpuBonus = (playerState.upgrades.cpuLevel - 1) * 0.15; 
            const ramMultiplier = playerState.upgrades.ramLevel; 
            
            const recoveryFactor = (playerState.furniture || []).reduce((sum, itemId) => {
                const item = FURNITURE_ITEMS.find(f => f.id === itemId);
                return sum + (item ? item.recovery : 0);
            }, 0);
            const manualYieldMultiplier = 1 + (recoveryFactor / 100);

            const addLog = (msg, type = 'info') => setLogs(prev => [...prev, { msg, type, id: Date.now() + Math.random() }].slice(-15)); 

            useEffect(() => { if (logsEndRef.current) logsEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            const playerStateRef = useRef(playerState);
            useEffect(() => { playerStateRef.current = playerState; }, [playerState]);

            useEffect(() => {
                if (playerState.upgrades.gpuLevel === 0) return; 
                const passiveTimer = setInterval(() => {
                    const currentState = playerStateRef.current;
                    let currentHeat = currentState.gpuHeat || 0;
                    const coolingPower = currentState.upgrades.coolingLevel === 1 ? 2 : 10;
                    currentHeat = Math.max(0, currentHeat - coolingPower);
                    let heatSpike = false; let amountGained = 0;

                    if (currentHeat < 100) {
                        const crypto = CRYPTO_TYPES[selectedCrypto];
                        const roll = Math.random();
                        if (roll <= crypto.successRate + ((currentState.upgrades.cpuLevel - 1) * 0.15)) {
                            const gpuMultiplier = currentState.upgrades.gpuLevel === 1 ? 0.2 : 0.6;
                            amountGained = crypto.mineAmount * currentState.upgrades.ramLevel * gpuMultiplier;
                            currentHeat += 6; 
                        } else {
                            currentHeat += 15; heatSpike = true;
                        }
                    }
                    currentHeat = Math.min(100, currentHeat);
                    setPlayerState(prev => ({
                        ...prev, gpuHeat: currentHeat,
                        inventory: amountGained > 0 ? { ...prev.inventory, [selectedCrypto]: Number((prev.inventory[selectedCrypto] + amountGained).toFixed(3)) } : prev.inventory
                    }));

                    if (heatSpike && Math.random() > 0.7) setLogs(prev => [...prev, { msg: "[GPU] Fehlerhafter Hash. Hitze-Spike!", type: 'error', id: Date.now() }].slice(-15));
                    else if (currentHeat >= 100 && (currentState.gpuHeat || 0) < 100) {
                        addNotification("SYSTEM WARNUNG", "GPU THERMAL THROTTLING. Kühlmittel spülen erforderlich!", "error");
                        setLogs(prev => {
                            if (prev.length > 0 && prev[prev.length-1].msg.includes("THROTTLING")) return prev;
                            return [...prev, { msg: "[SYS_ERR] GPU THERMAL THROTTLING. KÜHLUNG ERFORDERLICH.", type: 'error', id: Date.now() }].slice(-15);
                        });
                    }
                }, 1000); 
                return () => clearInterval(passiveTimer);
            }, [playerState.upgrades.gpuLevel, selectedCrypto]);

            const handleMine = () => {
                const crypto = CRYPTO_TYPES[selectedCrypto];
                if (Math.random() <= crypto.successRate + cpuBonus) {
                    const amountGained = crypto.mineAmount * ramMultiplier * manualYieldMultiplier;
                    setPlayerState(prev => ({ ...prev, inventory: { ...prev.inventory, [selectedCrypto]: Number((prev.inventory[selectedCrypto] + amountGained).toFixed(2)) }, profile: { ...prev.profile, totalHacks: prev.profile.totalHacks + 1 } }));
                    addLog(`[OK] Paket entschlüsselt. +${amountGained.toFixed(2)} ${crypto.id}`, 'success');
                } else {
                    addLog(`[ERR] Hash-Kollision. Mining von ${crypto.id} fehlgeschlagen.`, 'error');
                }
            };

            return (
                <div className="flex flex-col h-full font-mono">
                    <div className="flex border-b border-slate-800 mb-4 flex-shrink-0 p-2 bg-slate-900/50 items-center justify-between">
                        <span className="flex items-center gap-2 text-cyan-400 font-bold"><CpuIcon className="w-4 h-4" /> NETRUNNER_MINING_CORE</span>
                        <span className="text-[10px] text-slate-500">DECRYPTION READY</span>
                    </div>

                    <div className="flex-1 flex flex-col gap-4">
                        <div className="flex gap-2">
                            {Object.values(CRYPTO_TYPES).map(c => {
                                const actualRate = Math.min(100, (c.successRate + cpuBonus) * 100);
                                return (
                                    <button key={c.id} onClick={() => setSelectedCrypto(c.id)} className={`flex-1 p-2 border rounded-sm text-xs flex flex-col items-center gap-1 transition-all ${selectedCrypto === c.id ? `border-${c.color.split('-')[1]}-500 bg-slate-800 shadow-[0_0_10px_currentColor] ${c.color}` : 'border-slate-800 text-slate-500 hover:bg-slate-900'}`}>
                                        <DatabaseIcon className="w-5 h-5" /><span>{c.id}</span><span className="text-[10px] opacity-60">{actualRate.toFixed(0)}% RATE</span>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center p-4">
                            <button onClick={handleMine} className={`relative group flex items-center justify-center w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-slate-800 hover:border-cyan-500 hover:shadow-[0_0_30px_rgba(34,211,238,0.3)] transition-all bg-slate-950 active:scale-95 select-none`}>
                                <div className="absolute inset-2 border border-dashed border-slate-700 rounded-full group-hover:border-cyan-400/50 group-hover:animate-[spin_10s_linear_infinite]"></div>
                                <div className="flex flex-col items-center"><CpuIcon className={`w-10 h-10 md:w-14 md:h-14 ${CRYPTO_TYPES[selectedCrypto].color} group-hover:drop-shadow-[0_0_10px_currentColor]`} /><span className="mt-2 text-slate-400 font-bold tracking-widest text-sm md:text-base group-hover:text-white">DECRYPT</span></div>
                                {recoveryFactor > 0 && <div className="absolute -top-4 bg-green-900/80 text-green-400 border border-green-500 text-[10px] px-2 py-0.5 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.5)]">ERHOLUNGS-BOOST x{manualYieldMultiplier.toFixed(2)}</div>}
                            </button>
                            {playerState.upgrades.gpuLevel > 0 && (
                                <div className="w-full max-w-[200px] mt-6">
                                    <div className="flex justify-between text-[10px] font-bold text-slate-500 mb-1"><span>GPU TEMP</span><span className={heat >= 100 ? 'text-red-500 animate-pulse' : 'text-purple-400'}>{Math.floor(heat)}%</span></div>
                                    <div className="h-3 bg-slate-950 rounded border border-slate-800 overflow-hidden relative"><div className={`h-full transition-all duration-300 ${heat >= 100 ? 'bg-red-600' : heat > 75 ? 'bg-orange-500' : 'bg-purple-500'}`} style={{ width: `${heat}%` }}></div></div>
                                    <button onClick={() => { setPlayerState(prev => ({ ...prev, gpuHeat: Math.max(0, (prev.gpuHeat || 0) - 40) })); addLog("[SYS] Kühlmittel gespült. Temperatur sinkt.", "info"); }} className="w-full mt-2 py-1.5 bg-slate-900 hover:bg-slate-800 border border-slate-700 hover:border-cyan-500 text-[10px] text-slate-400 hover:text-cyan-400 font-bold rounded cursor-pointer transition-colors active:scale-95">FLUSH COOLANT (-40%)</button>
                                </div>
                            )}
                        </div>

                        <div className="h-28 bg-black border border-slate-800 rounded p-2 overflow-y-auto text-xs flex flex-col gap-1 mt-auto">
                            {logs.length === 0 && <span className="text-slate-600 italic">Warte auf Eingabe...</span>}
                            {logs.map(log => (<div key={log.id} className={log.type === 'success' ? 'text-green-400' : log.type === 'error' ? 'text-red-500' : 'text-slate-400'}><span className="opacity-50 mr-2">{new Date().toLocaleTimeString()}</span>{log.msg}</div>))}
                            <div ref={logsEndRef} />
                        </div>
                    </div>
                </div>
            );
        };

        const MarketApp = ({ playerState, setPlayerState, addNotification }) => {
            const [marketSelectedCoin, setMarketSelectedCoin] = useState('NNC');
            const [tradeInput, setTradeInput] = useState('1.00');
            const [rightPanelTab, setRightPanelTab] = useState('TRADE'); // NEU: Tabs ('TRADE' | 'ALERTS')
            
            // State für das Setzen neuer Alerts
            const [alertCondition, setAlertCondition] = useState('above'); 
            const [alertPrice, setAlertPrice] = useState('');

            const handleTrade = (action, isAll = false) => {
                const currentPrice = playerState.market?.[marketSelectedCoin]?.price || CRYPTO_TYPES[marketSelectedCoin].value;
                const availableCrypto = playerState.inventory[marketSelectedCoin];
                const availableCR = playerState.credits;
                
                let amountNum = parseFloat(tradeInput);

                if (action === 'SELL') {
                    const sellAmount = isAll ? availableCrypto : Math.min(availableCrypto, amountNum);
                    if (isNaN(sellAmount) || sellAmount <= 0) return;
                    
                    const revenue = sellAmount * currentPrice;
                    setPlayerState(prev => ({ 
                        ...prev, 
                        credits: prev.credits + revenue, 
                        inventory: { ...prev.inventory, [marketSelectedCoin]: Number((prev.inventory[marketSelectedCoin] - sellAmount).toFixed(2)) } 
                    }));
                    addNotification("TRADE EXEC", `VERKAUFT: ${sellAmount.toFixed(2)} ${marketSelectedCoin} für ${revenue.toFixed(2)} CR`, "success");
                } else if (action === 'BUY') {
                    const maxAffordable = availableCR / currentPrice;
                    const buyAmount = isAll ? maxAffordable : amountNum;
                    
                    if (isNaN(buyAmount) || buyAmount <= 0 || availableCR < buyAmount * currentPrice) {
                        addNotification("INSUFFICIENT FUNDS", "Nicht genug Credits für diese Transaktion.", "error");
                        return;
                    }

                    const cost = buyAmount * currentPrice;
                    setPlayerState(prev => ({ 
                        ...prev, 
                        credits: prev.credits - cost, 
                        inventory: { ...prev.inventory, [marketSelectedCoin]: Number((prev.inventory[marketSelectedCoin] + buyAmount).toFixed(2)) } 
                    }));
                    addNotification("TRADE EXEC", `GEKAUFT: ${buyAmount.toFixed(2)} ${marketSelectedCoin} für ${cost.toFixed(2)} CR`, "success");
                }
            };

            const setPercentageAmount = (pct, type) => {
                const currentPrice = playerState.market?.[marketSelectedCoin]?.price || CRYPTO_TYPES[marketSelectedCoin].value;
                if (type === 'BUY') {
                    const maxAffordable = playerState.credits / currentPrice;
                    setTradeInput((maxAffordable * pct).toFixed(2));
                } else {
                    const availableCrypto = playerState.inventory[marketSelectedCoin];
                    setTradeInput((availableCrypto * pct).toFixed(2));
                }
            };

            // NEU: Logik zum Hinzufügen von Alarmen
            const handleAddAlert = () => {
                const price = parseFloat(alertPrice);
                if (isNaN(price) || price <= 0) return;

                setPlayerState(prev => ({
                    ...prev,
                    marketAlerts: [
                        ...(prev.marketAlerts || []),
                        { id: Date.now(), coin: marketSelectedCoin, condition: alertCondition, targetPrice: price }
                    ]
                }));
                setAlertPrice('');
                addNotification("ALERT GESETZT", `Du wirst benachrichtigt, wenn ${marketSelectedCoin} ${alertCondition === 'above' ? 'über' : 'unter'} ${price.toFixed(2)} CR erreicht.`, "info");
            };

            // NEU: Logik zum Entfernen von Alarmen
            const removeAlert = (alertId) => {
                setPlayerState(prev => ({
                    ...prev,
                    marketAlerts: (prev.marketAlerts || []).filter(a => a.id !== alertId)
                }));
            };

            return (
                <div className="flex flex-col h-full font-mono bg-slate-950">
                    <div className="flex gap-2 p-2 border-b border-slate-800 flex-shrink-0 bg-black overflow-x-auto custom-scrollbar">
                        {Object.values(CRYPTO_TYPES).map(c => {
                            const mktData = playerState.market?.[c.id] || { price: c.value, trend: 0 };
                            const trend = mktData.trend;
                            const isSelected = marketSelectedCoin === c.id;
                            return (
                                <button 
                                    key={c.id} 
                                    onClick={() => setMarketSelectedCoin(c.id)} 
                                    className={`px-3 py-1.5 border rounded-sm text-xs flex items-center gap-3 transition-all whitespace-nowrap cursor-pointer ${isSelected ? `border-${c.color.split('-')[1]}-500 bg-slate-900 shadow-[0_0_10px_currentColor] ${c.color}` : 'border-slate-800 text-slate-500 hover:bg-slate-900'}`}
                                >
                                    <span className="font-bold">{c.id}</span>
                                    <span className="text-white">{mktData.price.toFixed(2)}</span>
                                    {trend > 0 ? <TrendingUpIcon className="w-3 h-3 text-green-500" /> : <TrendingDownIcon className="w-3 h-3 text-red-500" />}
                                </button>
                            );
                        })}
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row gap-4 overflow-hidden p-4">
                        <div className="flex-1 flex flex-col gap-4 overflow-y-auto lg:overflow-hidden relative">
                            {(() => {
                                const activeCoinData = CRYPTO_TYPES[marketSelectedCoin];
                                const mktData = playerState.market?.[marketSelectedCoin] || { price: activeCoinData.value, history: Array(40).fill(activeCoinData.value), trend: 0 };
                                const pctChange = mktData.trend !== 0 ? (mktData.trend / (mktData.price - mktData.trend)) * 100 : 0;
                                const high24 = Math.max(...mktData.history).toFixed(3);
                                const low24 = Math.min(...mktData.history).toFixed(3);
                                const vol24 = (mktData.price * 8432 + Math.random() * 1000).toLocaleString('de-DE', { maximumFractionDigits: 0 }) + " CR";

                                return (
                                    <div className="flex-1 min-h-[250px] bg-black border border-slate-800 rounded relative p-4 flex flex-col shadow-inner">
                                        <div className="flex justify-between items-start z-10 relative mb-4">
                                            <div>
                                                <div className={`text-4xl font-bold ${activeCoinData.color} tracking-wider flex items-center gap-2 drop-shadow-md`}>
                                                    {mktData.price.toFixed(3)} <span className="text-lg text-slate-500">CR</span>
                                                </div>
                                                <div className={`text-sm font-bold mt-1 ${mktData.trend > 0 ? 'text-green-500' : mktData.trend < 0 ? 'text-red-500' : 'text-slate-500'}`}>
                                                    {mktData.trend > 0 ? '+' : ''}{mktData.trend.toFixed(3)} ({pctChange.toFixed(2)}%)
                                                </div>
                                            </div>
                                            
                                            <div className="flex gap-4 text-right bg-slate-900/80 p-2 rounded border border-slate-800 backdrop-blur-sm">
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] text-slate-500">24H HIGH</span>
                                                    <span className="text-xs text-white">{high24}</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] text-slate-500">24H LOW</span>
                                                    <span className="text-xs text-white">{low24}</span>
                                                </div>
                                                <div className="flex flex-col border-l border-slate-700 pl-4 ml-2">
                                                    <span className="text-[10px] text-slate-500">24H VOL</span>
                                                    <span className="text-xs text-cyan-400">{vol24}</span>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="absolute left-0 right-0 bottom-0 top-24 px-2 pb-2 opacity-80">
                                            <Sparkline data={mktData.history} color={activeCoinData.hex} />
                                        </div>
                                        
                                        <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
                                    </div>
                                );
                            })()}
                        </div>

                        {/* RECHTE SPALTE: TRADING / ALERTS TERMINAL */}
                        <div className="w-full lg:w-72 flex flex-col gap-4 flex-shrink-0">
                            
                            <div className="bg-slate-900 border border-slate-700 p-4 rounded flex flex-col shadow-lg flex-1">
                                {/* NEU: Tabs für das Control Panel */}
                                <div className="flex border-b border-slate-800 pb-2 mb-4 gap-6 shrink-0">
                                    <button 
                                        onClick={() => setRightPanelTab('TRADE')} 
                                        className={`font-bold flex items-center gap-2 text-xs tracking-wider transition-colors ${rightPanelTab === 'TRADE' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500 hover:text-slate-300 border-b-2 border-transparent'}`}
                                    >
                                        <ActivityIcon className="w-4 h-4"/> TRADE
                                    </button>
                                    <button 
                                        onClick={() => setRightPanelTab('ALERTS')} 
                                        className={`font-bold flex items-center gap-2 text-xs tracking-wider transition-colors ${rightPanelTab === 'ALERTS' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500 hover:text-slate-300 border-b-2 border-transparent'}`}
                                    >
                                        <BellIcon className="w-4 h-4"/> ALERTS
                                    </button>
                                </div>

                                {rightPanelTab === 'TRADE' ? (
                                    <div className="flex flex-col gap-4">
                                        <div className="flex justify-between text-xs text-slate-400">
                                            <div className="flex flex-col"><span>Wallet:</span><span className="text-white font-bold">{playerState.inventory[marketSelectedCoin].toFixed(2)} {marketSelectedCoin}</span></div>
                                            <div className="flex flex-col text-right"><span>Liquide:</span><span className="text-cyan-400 font-bold">{playerState.credits.toFixed(2)} CR</span></div>
                                        </div>

                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-slate-500">MENGE (AMOUNT)</label>
                                            <div className="relative">
                                                <input 
                                                    type="number" 
                                                    value={tradeInput}
                                                    onChange={(e) => setTradeInput(e.target.value)}
                                                    className="w-full bg-black border border-slate-600 focus:border-cyan-500 rounded p-2 text-white font-mono text-sm outline-none transition-colors"
                                                    placeholder="0.00"
                                                />
                                                <div className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-500 font-bold">{marketSelectedCoin}</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-x-4 gap-y-2">
                                            <div className="text-[10px] text-slate-500 text-center">BUY %</div>
                                            <div className="text-[10px] text-slate-500 text-center">SELL %</div>
                                            
                                            <div className="grid grid-cols-2 gap-1">
                                                <button onClick={() => setPercentageAmount(0.5, 'BUY')} className="bg-slate-800 hover:bg-slate-700 text-xs py-1 rounded transition-colors text-slate-300">50%</button>
                                                <button onClick={() => setPercentageAmount(1.0, 'BUY')} className="bg-slate-800 hover:bg-slate-700 text-xs py-1 rounded transition-colors text-slate-300">MAX</button>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-1">
                                                <button onClick={() => setPercentageAmount(0.5, 'SELL')} className="bg-slate-800 hover:bg-slate-700 text-xs py-1 rounded transition-colors text-slate-300">50%</button>
                                                <button onClick={() => setPercentageAmount(1.0, 'SELL')} className="bg-slate-800 hover:bg-slate-700 text-xs py-1 rounded transition-colors text-slate-300">MAX</button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 mt-2">
                                            <button onClick={() => handleTrade('BUY')} className="py-3 bg-green-600 hover:bg-green-500 text-white text-sm font-bold tracking-widest rounded transition-all active:scale-95 shadow-[0_0_10px_rgba(22,163,74,0.3)] cursor-pointer">BUY</button>
                                            <button onClick={() => handleTrade('SELL')} className="py-3 bg-red-600 hover:bg-red-500 text-white text-sm font-bold tracking-widest rounded transition-all active:scale-95 shadow-[0_0_10px_rgba(220,38,38,0.3)] cursor-pointer">SELL</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-4 flex-1">
                                        <div className="text-xs text-slate-400">
                                            Neuer Preis-Alarm für <span className="text-white font-bold">{marketSelectedCoin}</span>
                                        </div>
                                        
                                        <div className="flex gap-2">
                                            <select 
                                                value={alertCondition} 
                                                onChange={e => setAlertCondition(e.target.value)}
                                                className="bg-black border border-slate-600 text-white text-xs font-mono rounded p-2 outline-none cursor-pointer"
                                            >
                                                <option value="above">Steigt über (&gt;)</option>
                                                <option value="below">Fällt unter (&lt;)</option>
                                            </select>
                                            <input 
                                                type="number" 
                                                value={alertPrice}
                                                onChange={e => setAlertPrice(e.target.value)}
                                                placeholder="0.00 CR"
                                                className="flex-1 min-w-0 bg-black border border-slate-600 focus:border-cyan-500 rounded p-2 text-white font-mono text-xs outline-none transition-colors"
                                            />
                                        </div>
                                        
                                        <button 
                                            onClick={handleAddAlert}
                                            className="w-full py-2 bg-slate-800 hover:bg-cyan-900/50 text-cyan-400 border border-slate-700 hover:border-cyan-500 text-xs font-bold tracking-widest rounded transition-all cursor-pointer"
                                        >
                                            + ALERT SPEICHERN
                                        </button>

                                        <div className="mt-2 border-t border-slate-800 pt-4 flex-1 flex flex-col min-h-0">
                                            <div className="text-[10px] text-slate-500 mb-2 shrink-0">AKTIVE ALARME:</div>
                                            <div className="overflow-y-auto custom-scrollbar flex-1 pr-1">
                                                {(!playerState.marketAlerts || playerState.marketAlerts.length === 0) ? (
